name: Deploy to Modal (Stable)

on:
  workflow_dispatch:
  schedule:
    - cron: '38 10 * * *'  # 每天 北京时间 18:38 一次

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Modal SDK & jq
        run: |
          pip install --no-cache-dir --upgrade "modal>=0.58.0"
          sudo apt-get update && sudo apt-get install -y jq

      - name: Setup Modal Auth
        run: |
          modal token set --token-id $MODAL_TOKEN_ID --token-secret $MODAL_TOKEN_SECRET
        env:
          MODAL_TOKEN_ID: ${{ secrets.MODAL_TOKEN_ID }}
          MODAL_TOKEN_SECRET: ${{ secrets.MODAL_TOKEN_SECRET }}

      # 🔥 只杀你的 ai-inferbox，绝不误删其他
      - name: Stop old ai-inferbox only
        run: |
          modal sandbox list --json | jq -r '
            .[] | 
            select(.description != null and (.description | contains("ai-inferbox"))) | 
            .sandbox_id
          ' | while read id; do
            if [ -n "$id" ]; then
              echo "Stopping old sandbox: $id"
              modal sandbox stop "$id"
            fi
          done

      # 🚀 启动新实例
      - name: Run app remotely
        run: python deploy.py --sandbox

      # 📌 轻量保活提交
      - name: Commit time.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          echo "$(date +'%Y-%m-%d %H:%M:%S')" > time.txt
          git add time.txt
          git diff --cached --quiet || git commit -m "⏱️ keep alive"
          git push origin HEAD:main
